name: API Docs Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: api-docs-pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate OpenAPI files
        env:
          ENVIRONMENT: documentation
          DATABASE_URL: sqlite:///./docs-generation.db
          SECRET_KEY: docs-generation-secret
          JWT_SECRET_KEY: docs-generation-secret
          JWT_ACCESS_SECRET_KEY: docs-generation-secret
          JWT_REFRESH_SECRET_KEY: docs-generation-secret
          CORS_ORIGINS: "*"
          SQL_ECHO: "false"
        run: uv run python scripts/export_openapi.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4