name: Build and Push Image

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: build-medi-check-main
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  AR_REPO: ${{ vars.GAR_REPOSITORY }}
  IMAGE: ${{ vars.GAR_IMAGE }}

jobs:
  build:
    name: Build and push container image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Artifact Registry authentication
        shell: bash
        run: |
          gcloud auth configure-docker \
            "${REGION}-docker.pkg.dev" \
            --quiet

      - name: Compute image URI
        id: image
        shell: bash
        run: |
          IMAGE_BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE}"

          echo "base=${IMAGE_BASE}" >> "${GITHUB_OUTPUT}"
          echo "sha=${IMAGE_BASE}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "latest=${IMAGE_BASE}:latest" >> "${GITHUB_OUTPUT}"

          echo "Building image: ${IMAGE_BASE}:${GITHUB_SHA}"

      - name: Build image
        shell: bash
        run: |
          docker build \
            --tag "${{ steps.image.outputs.sha }}" \
            --tag "${{ steps.image.outputs.latest }}" \
            .

      - name: Push image with commit SHA
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.sha }}"

      - name: Push latest tag
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.latest }}"

      - name: Write build summary
        shell: bash
        run: |
          {
            echo "## Container image"
            echo ""
            echo "- SHA image: \`${{ steps.image.outputs.sha }}\`"
            echo "- Latest image: \`${{ steps.image.outputs.latest }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
