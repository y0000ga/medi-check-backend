name: Release to Cloud Run

on:
  workflow_run:
    workflows:
      - Build and Push Image
    types:
      - completed

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-medi-check-production
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}

  AR_REPO: ${{ vars.GAR_REPOSITORY }}
  IMAGE: ${{ vars.GAR_IMAGE }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}

  RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
  CLOUDSQL_INSTANCE: ${{ vars.CLOUD_SQL_CONNECTION_NAME }}

  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  SQL_ECHO: ${{ vars.SQL_ECHO }}
  CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}

jobs:
  release:
    name: Migrate and deploy production
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Compute image URI
        id: image
        shell: bash
        env:
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE}:${IMAGE_SHA}"

          echo "uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          echo "sha=${IMAGE_SHA}" >> "${GITHUB_OUTPUT}"

          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

          echo "Release image: ${IMAGE_URI}"

      - name: Verify image exists
        shell: bash
        run: |
          gcloud artifacts docker images describe "${IMAGE_URI}" \
            --project="${PROJECT_ID}"

      # 使用相同的 production image 執行一次 Alembic migration。
      # 避免將 migration 放入 Web Container 啟動流程，
      # 否則 Cloud Run 擴展多個 instance 時可能重複執行 migration。
      - name: Create or update migration job
        shell: bash
        run: |
          gcloud run jobs deploy "${SERVICE}-migrate" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${IMAGE_URI}" \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --set-cloudsql-instances="${CLOUDSQL_INSTANCE}" \
            --set-env-vars="ENVIRONMENT=${ENVIRONMENT},SQL_ECHO=${SQL_ECHO}" \
            --set-secrets="DATABASE_URL=DATABASE_URL:1,SECRET_KEY=SECRET_KEY:1,JWT_SECRET_KEY=JWT_SECRET_KEY:1,JWT_ACCESS_SECRET_KEY=JWT_ACCESS_SECRET_KEY:1,JWT_REFRESH_SECRET_KEY=JWT_REFRESH_SECRET_KEY:1" \
            --command="uv" \
            --args="run,alembic,upgrade,head" \
            --tasks=1 \
            --max-retries=0 \
            --task-timeout=10m \
            --quiet

      - name: Execute database migration
        shell: bash
        run: |
          gcloud run jobs execute "${SERVICE}-migrate" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --wait

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --image="${IMAGE_URI}" \
            --region="${REGION}" \
            --platform=managed \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --allow-unauthenticated \
            --port=8080 \
            --execution-environment=gen2 \
            --add-cloudsql-instances="${CLOUDSQL_INSTANCE}" \
            --set-env-vars="^|^ENVIRONMENT=${ENVIRONMENT}|CORS_ORIGINS=${CORS_ORIGINS}|SQL_ECHO=${SQL_ECHO}" \
            --set-secrets="DATABASE_URL=DATABASE_URL:1,SECRET_KEY=SECRET_KEY:1,JWT_SECRET_KEY=JWT_SECRET_KEY:1,JWT_ACCESS_SECRET_KEY=JWT_ACCESS_SECRET_KEY:1,JWT_REFRESH_SECRET_KEY=JWT_REFRESH_SECRET_KEY:1" \
            --quiet

      - name: Verify deployed service
        shell: bash
        run: |
          gcloud run services describe "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --format="yaml(
              metadata.name,
              status.url,
              status.latestReadyRevisionName,
              spec.template.spec.serviceAccountName
            )"

      - name: Write deployment summary
        shell: bash
        run: |
          SERVICE_URL="$(
            gcloud run services describe "${SERVICE}" \
              --project="${PROJECT_ID}" \
              --region="${REGION}" \
              --format='value(status.url)'
          )"

          {
            echo "## Cloud Run release"
            echo ""
            echo "- Service: \`${SERVICE}\`"
            echo "- Region: \`${REGION}\`"
            echo "- Image: \`${IMAGE_URI}\`"
            echo "- Commit: \`${{ github.event.workflow_run.head_sha }}\`"
            echo "- URL: ${SERVICE_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
